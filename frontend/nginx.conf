server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Allow request bodies large enough for icon uploads (backend caps at 2MB)
    # and editing sizeable wordlist/resolver files. Without this nginx's 1MB
    # default rejects them with a 413 in production (the Vite dev proxy has no
    # such limit, so the gap is invisible during development).
    client_max_body_size 25m;

    # Single-page app: serve index.html for any non-file route so client-side
    # routing (e.g. /data, /settings) works on direct load / refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST API: strip the /api prefix and forward to the backend, matching the
    # Vite dev proxy's rewrite (/api/scans -> backend /scans).
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket: forward /ws/* unchanged (the dev proxy does not rewrite it) with
    # the connection-upgrade headers required for the scan stream.
    location /ws/ {
        proxy_pass http://backend:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}
